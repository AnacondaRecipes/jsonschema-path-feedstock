{% set name = "jsonschema-path" %}
{% set version = "0.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/p1c2u/{{ name }}/archive/refs/tags/{{ version }}.tar.gz
  sha256: 1e091d3f1f5365ff189356245307cff74e8e398c85e8e831ede8add169734bca

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --ignore-installed --no-build-isolation
  skip: true  # [py<310]

requirements:
  host:
    - pip
    - poetry-core
    - python
  run:
    - pathable >=0.5.0,<0.6.0
    - python
    - pyyaml >=5.1
    - referencing <0.38.0
  run_constrained:
    - requests >=2.31.0,<3.0.0

test:
  source_files:
    - tests
    - pyproject.toml
  imports:
    - jsonschema_path
  commands:
    - pip check
    - pytest -v tests/unit
  requires:
    - pip
    - pytest
    - pytest-cov >=5.0.0
    - responses >=0.25.0

about:
  home: https://github.com/p1c2u/jsonschema-path
  description: |
    JSONSchema Spec with object-oriented paths
    - Traverse schema like paths
    - Access schema on demand with separate dereferencing accessor layer
  summary: JSONSchema Spec with object-oriented paths
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  dev_url: https://github.com/p1c2u/jsonschema-path
  doc_url: https://github.com/p1c2u/jsonschema-path/blob/main/README.rst

extra:
  recipe-maintainers:
    - bollwyvl
